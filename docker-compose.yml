services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: factura
      POSTGRES_PASSWORD: factura
      POSTGRES_DB: factura
    ports:
      - "5433:5432"
    volumes:
      - factura_pgdata:/var/lib/postgresql/data

  # S3-compatible object storage for the original PDFs (local dev only).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: factura
      MINIO_ROOT_PASSWORD: facturasecret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - factura_minio:/data

  # One-shot: create the bucket on startup so uploads have somewhere to land.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 factura facturasecret; do sleep 1; done;
      mc mb --ignore-existing local/factura;
      "

volumes:
  factura_pgdata:
  factura_minio:
